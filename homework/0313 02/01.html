<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個人自我介紹表單</title>
    <style>
        body {
            font-family: "Microsoft JhengHei", sans-serif;
            background: #f4f8fb;
            margin: 0;
            padding: 30px;
        }

        .container {
            max-width: 850px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            color: #2c3e50;
        }

        p {
            text-align: center;
            color: #666;
        }

        fieldset {
            border: 2px solid #dbe6f0;
            border-radius: 10px;
            margin-bottom: 20px;
            padding: 20px;
        }

        legend {
            font-weight: bold;
            color: #34495e;
            padding: 0 10px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: inline-block;
            margin-bottom: 6px;
            font-weight: bold;
            color: #333;
        }

        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #bbb;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 15px;
        }

        textarea {
            resize: vertical;
        }

        .inline-group {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 8px;
        }

        .inline-group label {
            font-weight: normal;
        }

        .small-input {
            width: auto;
            margin-right: 5px;
        }

        .btn-group {
            text-align: center;
            margin-top: 20px;
        }

        button {
            padding: 12px 25px;
            margin: 5px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }

        .submit-btn {
            background-color: #4CAF50;
            color: white;
        }

        .reset-btn {
            background-color: #e67e22;
            color: white;
        }

        button:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>個人自我介紹表單</h1>
        <p>請填寫以下資料，讓大家更認識你！</p>

        <form>
            <fieldset>
                <legend>基本資料</legend>

                <div class="form-group">
                    <label for="name">姓名：</label>
                    <input type="text" id="name" name="name" placeholder="請輸入你的姓名" required>
                </div>

                <div class="form-group">
                    <label for="nickname">暱稱：</label>
                    <input type="text" id="nickname" name="nickname" placeholder="例如：小雨、小安">
                </div>

                <div class="form-group">
                    <label for="password">密碼：</label>
                    <input type="password" id="password" name="password" placeholder="請輸入密碼">
                </div>

                <div class="form-group">
                    <label for="email">電子郵件：</label>
                    <input type="email" id="email" name="email" placeholder="example@gmail.com">
                </div>

                <div class="form-group">
                    <label for="phone">電話：</label>
                    <input type="tel" id="phone" name="phone" placeholder="09xxxxxxxx">
                </div>

                <div class="form-group">
                    <label for="birthday">生日：</label>
                    <input type="date" id="birthday" name="birthday">
                </div>

                <div class="form-group">
                    <label for="age">年齡：</label>
                    <input type="number" id="age" name="age" min="1" max="120" placeholder="請輸入年齡">
                </div>
            </fieldset>

            <fieldset>
                <legend>個人選項</legend>

                <div class="form-group">
                    <label>性別：</label>
                    <div class="inline-group">
                        <label><input class="small-input" type="radio" name="gender" value="male"> 男</label>
                        <label><input class="small-input" type="radio" name="gender" value="female"> 女</label>
                        <label><input class="small-input" type="radio" name="gender" value="other"> 其他</label>
                    </div>
                </div>

                <div class="form-group">
                    <label for="blood">血型：</label>
                    <select id="blood" name="blood">
                        <option value="">請選擇血型</option>
                        <option value="A">A 型</option>
                        <option value="B">B 型</option>
                        <option value="O">O 型</option>
                        <option value="AB">AB 型</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="zodiac">星座：</label>
                    <select id="zodiac" name="zodiac">
                        <option value="">請選擇星座</option>
                        <option>牡羊座</option>
                        <option>金牛座</option>
                        <option>雙子座</option>
                        <option>巨蟹座</option>
                        <option>獅子座</option>
                        <option>處女座</option>
                        <option>天秤座</option>
                        <option>天蠍座</option>
                        <option>射手座</option>
                        <option>摩羯座</option>
                        <option>水瓶座</option>
                        <option>雙魚座</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="department">科系：</label>
                    <input type="text" id="department" name="department" placeholder="例如：資訊工程學系">
                </div>

                <div class="form-group">
                    <label for="grade">年級：</label>
                    <select id="grade" name="grade">
                        <option value="">請選擇年級</option>
                        <option>大一</option>
                        <option>大二</option>
                        <option>大三</option>
                        <option>大四</option>
                        <option>研究所</option>
                    </select>
                </div>
            </fieldset>

            <fieldset>
                <legend>興趣與偏好</legend>

                <div class="form-group">
                    <label>興趣：</label>
                    <div class="inline-group">
                        <label><input class="small-input" type="checkbox" name="hobby" value="music"> 音樂</label>
                        <label><input class="small-input" type="checkbox" name="hobby" value="sports"> 運動</label>
                        <label><input class="small-input" type="checkbox" name="hobby" value="reading"> 閱讀</label>
                        <label><input class="small-input" type="checkbox" name="hobby" value="travel"> 旅遊</label>
                        <label><input class="small-input" type="checkbox" name="hobby" value="game"> 遊戲</label>
                        <label><input class="small-input" type="checkbox" name="hobby" value="art"> 畫畫</label>
                    </div>
                </div>

                <div class="form-group">
                    <label>擅長項目（可多選）：</label>
                    <div class="inline-group">
                        <label><input class="small-input" type="checkbox" name="skills" value="寫程式"> 寫程式</label>
                        <label><input class="small-input" type="checkbox" name="skills" value="設計"> 設計</label>
                        <label><input class="small-input" type="checkbox" name="skills" value="唱歌"> 唱歌</label>
                        <label><input class="small-input" type="checkbox" name="skills" value="跳舞"> 跳舞</label>
                        <label><input class="small-input" type="checkbox" name="skills" value="攝影"> 攝影</label>
                        <label><input class="small-input" type="checkbox" name="skills" value="語言學習"> 語言學習</label>
                    </div>
                </div>

                <div class="form-group">
                    <label for="favcolor">喜歡的顏色：</label>
                    <input type="color" id="favcolor" name="favcolor">
                </div>

                <div class="form-group">
                    <label for="personality">活潑程度：</label>
                    <input type="range" id="personality" name="personality" min="0" max="10">
                </div>
            </fieldset>

            <fieldset>
                <legend>自我介紹內容</legend>

                <div class="form-group">
                    <label for="motto">座右銘：</label>
                    <input type="text" id="motto" name="motto" placeholder="輸入一句最能代表你的話">
                </div>

                <div class="form-group">
                    <label for="website">個人網站 / 社群連結：</label>
                    <input type="url" id="website" name="website" placeholder="https://example.com">
                </div>

                <div class="form-group">
                    <label for="time">平常起床時間：</label>
                    <input type="time" id="time" name="time">
                </div>

                <div class="form-group">
                    <label for="photo">上傳個人照片：</label>
                    <input type="file" id="photo" name="photo" accept="image/*">
                </div>

                <div class="form-group">
                    <label for="intro">自我介紹：</label>
                    <textarea id="intro" name="intro" rows="6" placeholder="請輸入你的自我介紹內容"></textarea>
                </div>
            </fieldset>

            <div class="btn-group">
                <button type="submit" class="submit-btn">送出表單</button>
                <button type="reset" class="reset-btn">重新填寫</button>
            </div>
        </form>
    </div>
</body>
</html>
